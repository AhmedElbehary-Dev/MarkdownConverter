name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Win-x64
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish MarkdownConverter.csproj -c Release -r win-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Download PDF dependencies
        shell: pwsh
        run: .\packaging\windows\download-deps.ps1

      - name: Compile Inno Setup Script
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content .\packaging\windows\setup.iss) -replace 'AppVersion=\d+\.\d+\.\d+', "AppVersion=$ver" | Set-Content .\packaging\windows\setup.iss
          mkdir release -ea 0
          iscc .\packaging\windows\setup.iss

      - name: Build MSIX
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          .\packaging\windows\build-msix.ps1 -Version $ver

      - name: Create Portable Zip
        run: Compress-Archive -Path .\bin\Release\net10.0\win-x64\publish\* -DestinationPath .\release\MarkdownConverter-win-x64-portable.zip -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release\*.exe
            release\*.msix
            release\*.zip

  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build Debian Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-deb.sh
          cd ./packaging/linux
          ./build-deb.sh ${{ github.ref_name }}

      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm patchelf

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build RPM Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-rpm.sh
          ./packaging/linux/build-rpm.sh ${{ github.ref_name }}

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/*.rpm

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install AppImage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 imagemagick

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build AppImage
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-appimage.sh
          ./packaging/linux/build-appimage.sh ${{ github.ref_name }}

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  release:
    needs: [build-windows, build-linux-deb, build-linux-rpm, build-linux-appimage]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts for debugging
        run: find artifacts/ -type f | sort

      - name: Generate Release Body
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $prevTag = ""
          try { $prevTag = git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>$null } catch {}
          if ([string]::IsNullOrWhiteSpace($prevTag)) { $prevTag = "v2.0.8" }
          
          $tagMsg = (git tag -l --format='%(contents)' ${{ github.ref_name }}) -join "`n"
          if ([string]::IsNullOrWhiteSpace($tagMsg)) {
              $r = "`u{1F680}"
              $tagMsg = "$r WHAT'S NEW IN V$ver`n`nThis release includes several updates across all platforms."
          }
          
          $body = "$tagMsg`n`n----------------------------------------"
          $body += "`n`nFull Changelog: https://github.com/AhmedElbehary-Dev/MarkdownConverter/compare/$prevTag...v$ver"
          $body | Set-Content -Encoding UTF8 release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release v${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            artifacts/*.exe
            artifacts/*.msix
            artifacts/*.zip
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
          generate_release_notes: false
          fail_on_unmatched_files: false
