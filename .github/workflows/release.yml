name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Win-x64
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish MarkdownConverter.csproj -c Release -r win-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Compile Inno Setup Script
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content .\packaging\windows\setup.iss) -replace 'AppVersion=2.0.8', "AppVersion=$ver" | Set-Content .\packaging\windows\setup.iss
          mkdir release -ea 0
          iscc .\packaging\windows\setup.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release\*.exe

  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build Debian Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-deb.sh
          cd ./packaging/linux
          ./build-deb.sh ${{ github.ref_name }}

      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  release:
    needs: [build-windows, build-linux-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts for debugging
        run: find artifacts/ -type f | sort

      - name: Generate Release Body
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $prevTag = ""
          try {
              $prevTag = git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>$null
          } catch {
              Write-Warning "Could not find previous tag via git."
          }
          if ([string]::IsNullOrWhiteSpace($prevTag)) { $prevTag = "v2.0.7" }
          $rocket = [char]0x1F680
          $sparkles = [char]0x2728
          $phone = [char]0x1F4F1
          $tools = [char]0x1F6E0
          $body = "## $rocket WHAT'S NEW IN V$ver`n"
          $body += "`nThis release of **Markdown Converter Pro** includes several updates across all platforms.`n"
          $body += "`n### $sparkles FEATURES & IMPROVEMENTS`n"
          $body += "* Enhanced version checking to prevent accidental downgrades.`n"
          $body += "* Improved uninstallation cleanup - removes all files, shortcuts, and registry entries.`n"
          $body += "`n### $phone MULTI-PLATFORM SUPPORT`n"
          $body += "* **Windows**: Single .exe installer (next, next, finish) with Inno Setup.`n"
          $body += "* **Linux**: Debian (.deb) package with proper maintainer scripts.`n"
          $body += "`n### $tools CHANGES IN THIS VERSION`n"
          $body += "* Streamlined Windows release to a single .exe installer.`n"
          $body += "* Added maintainer scripts for Debian packages.`n"
          $body += "`n----------------------------------------`n"
          $body += "`nFull Changelog: https://github.com/AhmedElbehary-Dev/MarkdownConverter/compare/$prevTag...v$ver`n"
          $body | Set-Content release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WHAT'S NEW IN ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            artifacts/*.exe
            artifacts/*.deb
          generate_release_notes: false
          fail_on_unmatched_files: false
