name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-exe-msi:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Win-x64
        run: dotnet publish MarkdownConverter.csproj -c Release -r win-x64 --self-contained true /p:Version=${{ github.ref_name }} /p:InformationalVersion=${{ github.ref_name }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress
      
      - name: Compile Inno Setup Script
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content .\packaging\windows\setup.iss) -replace 'AppVersion=2.0.2', "AppVersion=$ver" | Set-Content .\packaging\windows\setup.iss
          mkdir release -ea 0
          iscc .\packaging\windows\setup.iss

      - name: Setup WiX toolset
        run: dotnet tool install --global wix

      - name: Build Windows MSI with WiX Toolset
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content .\packaging\windows\setup.wxs) -replace 'Version="2.0.2"', "Version=`"$ver`"" | Set-Content .\packaging\windows\setup.wxs
          wix build .\packaging\windows\setup.wxs -o .\release\MarkdownConverter.msi
        
      - name: Upload Windows Output
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            release\MarkdownConverter-Setup-x64.exe
            release\MarkdownConverter.msi

  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Linux-x64
        run: dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=${{ github.ref_name }} /p:InformationalVersion=${{ github.ref_name }}

      - name: Build Debian Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-deb.sh
          cd ./packaging/linux
          ./build-deb.sh ${{ github.ref_name }}

      - name: Upload Debian Output
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: release/*.deb

  build-macos-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish macOS-x64
        run: dotnet publish MarkdownConverter.csproj -c Release -r osx-x64 --self-contained true /p:Version=${{ github.ref_name }} /p:InformationalVersion=${{ github.ref_name }}

      - name: Build macOS DMG
        run: |
          mkdir -p release
          chmod +x ./packaging/macos/build-dmg.sh
          cd ./packaging/macos
          ./build-dmg.sh ${{ github.ref_name }}

      - name: Upload macOS Output
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: release/*.dmg

  release:
    needs: [build-windows-exe-msi, build-linux-deb, build-macos-dmg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/MarkdownConverter-Setup-x64.exe
            artifacts/MarkdownConverter.msi
            artifacts/*.deb
            artifacts/*.dmg
          generate_release_notes: true
