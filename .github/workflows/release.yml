name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Win-x64
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish MarkdownConverter.csproj -c Release -r win-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Compile Inno Setup Script
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content .\packaging\windows\setup.iss) -replace 'AppVersion=2.0.8', "AppVersion=$ver" | Set-Content .\packaging\windows\setup.iss
          mkdir release -ea 0
          iscc .\packaging\windows\setup.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release\*.exe

  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build Debian Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-deb.sh
          cd ./packaging/linux
          ./build-deb.sh ${{ github.ref_name }}

      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build RPM Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-rpm.sh
          ./packaging/linux/build-rpm.sh ${{ github.ref_name }}

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/*.rpm

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install AppImage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 imagemagick

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build AppImage
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-appimage.sh
          ./packaging/linux/build-appimage.sh ${{ github.ref_name }}

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  release:
    needs: [build-windows, build-linux-deb, build-linux-rpm, build-linux-appimage]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts for debugging
        run: find artifacts/ -type f | sort

      - name: Generate Release Body
        shell: pwsh
        run: >
          $ver = "${{ github.ref_name }}".TrimStart('v');
          $prevTag = "";
          try { $prevTag = git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>$null } catch {};
          if ([string]::IsNullOrWhiteSpace($prevTag)) { $prevTag = "v2.0.7" };
          $r = [char]0x1F680; $s = [char]0x2728; $p = [char]0x1F4F1; $t = [char]0x1F6E0;
          $lines = @(
            "This release of **Markdown Converter Pro** includes several updates across all platforms.",
            "",
            "$s FEATURES & IMPROVEMENTS",
            "* Redesigned Main Window: Modern Grid-based layout with drag-and-drop support and intuitive conversion controls.",
            "* Quick Paste UI: Paste markdown content directly without needing to open a file.",
            "* Resolved all CodeQL security alerts for unmanaged code and error handling.",
            "",
            "$p MULTI-PLATFORM SUPPORT",
            "* **Windows**: .exe installer (Inno Setup) - Standard installer experience.",
            "* **Linux**: .deb package (Debian / Ubuntu) with proper maintainer scripts.",
            "* **Linux**: .rpm package (Fedora / RHEL / CentOS) with cleanup scripts.",
            "* **Linux**: .AppImage - Universal, no install required.",
            "",
            "$t CHANGES IN THIS VERSION",
            "* Implemented Avalonia desktop project architecture.",
            "* Added maintainer scripts for Debian and RPM packages.",
            "* Enhanced AppImage with AppStream metadata and improved icon handling.",
            "* Automated version bumping during the release process.",
            "",
            "----------------------------------------",
            "",
            "Full Changelog: $prevTag...v$ver"
          );
          ($lines -join "`n") | Set-Content release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release v${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            artifacts/*.exe
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
          generate_release_notes: false
          fail_on_unmatched_files: false
