name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
    
    - name: Publish Windows Standalone Executable
      run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Markdown Converter Pro ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          src/MarkdownConverter.Desktop/bin/Release/net10.0/win-x64/publish/MarkdownConverter.Desktop.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
