name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v2.0.8)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Win-x64
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish MarkdownConverter.csproj -c Release -r win-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build Windows Setup .exe
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content .\packaging\windows\setup.iss) -replace 'AppVersion=.*', "AppVersion=$ver" | Set-Content .\packaging\windows\setup.iss
          mkdir release -ea 0
          iscc .\packaging\windows\setup.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release\*.exe

  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build Debian Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-deb.sh
          cd ./packaging/linux
          ./build-deb.sh ${{ github.ref_name }}

      - name: Create Portable tar.gz
        run: |
          mkdir -p release
          tar czf "release/MarkdownConverter-linux-x64-portable.tar.gz" \
            -C bin/Release/net10.0/linux-x64/publish .

      - name: Upload Debian & Portable Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-installers
          path: |
            release/*.deb
            release/MarkdownConverter-linux-x64-portable.tar.gz

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install AppImage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 imagemagick

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build AppImage
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-appimage.sh
          ./packaging/linux/build-appimage.sh ${{ github.ref_name }}

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build RPM Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-rpm.sh
          ./packaging/linux/build-rpm.sh ${{ github.ref_name }}

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/*.rpm

  build-linux-flatpak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build Flatpak
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-flatpak.sh
          ./packaging/linux/build-flatpak.sh ${{ github.ref_name }}

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: release/*.flatpak

  build-linux-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Snap dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y snapd
          sudo snap install snapcraft --classic

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build Snap
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-snap.sh
          ./packaging/linux/build-snap.sh ${{ github.ref_name }}

      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-snap
          path: release/*.snap

  release:
    if: always()
    needs: [build-windows, build-linux-deb, build-linux-appimage, build-linux-rpm, build-linux-flatpak, build-linux-snap]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Version
        id: set_version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
          } else {
            $ver = "${{ github.ref_name }}"
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts for debugging
        run: find artifacts/ -type f | sort

      - name: Generate Release Body
        shell: pwsh
        env:
          VERSION: ${{ steps.set_version.outputs.version }}
        run: |
          $ver = $env:VERSION.TrimStart('v')
          $prevTag = ""
          try {
            $prevTag = git describe --tags --abbrev=0 "$($env:VERSION)^" 2>$null
          } catch {
            Write-Warning "Could not find previous tag via git."
          }
          if ([string]::IsNullOrWhiteSpace($prevTag)) { $prevTag = "v2.0.7" }

          $body = @"
## 🚀 WHAT'S NEW IN V$ver

This release of **Markdown Converter Pro** includes several updates across all platforms.

### ✨ FEATURES & IMPROVEMENTS
* Enhanced version checking to prevent accidental downgrades.
* Improved uninstallation cleanup — removes all files, shortcuts, and registry entries.
* Expanded Linux distribution support with Flatpak and Snap packages.

### 📱 MULTI-PLATFORM SUPPORT
* **Windows**: Single .exe installer (next, next, finish) with Inno Setup.
* **Linux**: Debian (.deb), RPM (.rpm), Flatpak, Snap, and AppImage for maximum compatibility.

### 🛠 CHANGES IN THIS VERSION
* Streamlined Windows release to a single .exe installer.
* Added maintainer scripts for Debian and RPM packages.
* Added Flatpak and Snap packaging for universal Linux compatibility.
* Enhanced AppImage with AppStream metadata and Zstd compression.

----------------------------------------

Full Changelog: https://github.com/AhmedElbehary-Dev/MarkdownConverter/compare/$prevTag...$env:VERSION
"@

          $body | Set-Content release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🚀 WHAT'S NEW IN ${{ steps.set_version.outputs.version }}"
          body_path: release_notes.md
          files: |
            artifacts/*.exe
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
            artifacts/*.flatpak
            artifacts/*.snap
          generate_release_notes: false
          fail_on_unmatched_files: false
