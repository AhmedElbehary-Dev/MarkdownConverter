name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Win-x64
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish MarkdownConverter.csproj -c Release -r win-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Compile Inno Setup Script
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content .\packaging\windows\setup.iss) -replace 'AppVersion=2.0.8', "AppVersion=$ver" | Set-Content .\packaging\windows\setup.iss
          mkdir release -ea 0
          iscc .\packaging\windows\setup.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release\*.exe

  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build Debian Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-deb.sh
          cd ./packaging/linux
          ./build-deb.sh ${{ github.ref_name }}

      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm patchelf

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build RPM Package
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-rpm.sh
          ./packaging/linux/build-rpm.sh ${{ github.ref_name }}

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/*.rpm

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install AppImage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 imagemagick

      - name: Publish Linux-x64
        run: |
          ver=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          dotnet publish MarkdownConverter.csproj -c Release -r linux-x64 --self-contained true /p:Version=$ver /p:InformationalVersion=${{ github.ref_name }}

      - name: Build AppImage
        run: |
          mkdir -p release
          chmod +x ./packaging/linux/build-appimage.sh
          ./packaging/linux/build-appimage.sh ${{ github.ref_name }}

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  release:
    needs: [build-windows, build-linux-deb, build-linux-rpm, build-linux-appimage]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts for debugging
        run: find artifacts/ -type f | sort

      - name: Generate Release Body
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $prevTag = ""
          try { $prevTag = git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>$null } catch {}
          if ([string]::IsNullOrWhiteSpace($prevTag)) { $prevTag = "v2.0.7" }
          $r = "`u{1F680}"
          $s = "`u{2728}"
          $p = "`u{1F4F1}"
          $t = "`u{1F6E0}"
          $body = "$r WHAT'S NEW IN V$ver`n"
          $body += "`nThis release of **Markdown Converter Pro** includes several updates across all platforms."
          $body += "`n`n$s FEATURES & IMPROVEMENTS"
          $body += "`n* Redesigned Main Window: Modern Grid-based layout with drag-and-drop support."
          $body += "`n* Quick Paste UI: Paste markdown content directly without opening a file."
          $body += "`n* Resolved all CodeQL security alerts for unmanaged code and error handling."
          $body += "`n`n$p MULTI-PLATFORM SUPPORT"
          $body += "`n* **Windows**: .exe installer (Inno Setup)."
          $body += "`n* **Linux**: .deb package (Debian / Ubuntu) with proper maintainer scripts."
          $body += "`n* **Linux**: .rpm package (Fedora / RHEL / CentOS) with cleanup scripts."
          $body += "`n* **Linux**: .AppImage - Universal, no install required."
          $body += "`n`n$t CHANGES IN THIS VERSION"
          $body += "`n* Implemented Avalonia desktop project architecture."
          $body += "`n* Added maintainer scripts for Debian and RPM packages."
          $body += "`n* Enhanced AppImage with AppStream metadata."
          $body += "`n`n----------------------------------------"
          $body += "`n`nFull Changelog: https://github.com/AhmedElbehary-Dev/MarkdownConverter/compare/$prevTag...v$ver"
          $body | Set-Content -Encoding UTF8 release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release v${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            artifacts/*.exe
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
          generate_release_notes: false
          fail_on_unmatched_files: false
